    url: https://github.com/pytorch/examples.git
    ref: main
    local_dir: benchmarks/vendor/pytorch-examples
  pytorch_vision:
    url: https://github.com/pytorch/vision.git
    ref: main
    local_dir: benchmarks/vendor/pytorch-vision
  recipe_local:
    url: local
    ref: local
    local_dir: /home/students/cs/202421012/food_weight_estimation/VIF2/recipe_adamine

benchmarks:
  - id: level1-mnist
    level: 1
    official: true
    label: MNIST Net
